- text: Learned memory policies (AgeMem) make adaptive storage decisions (Yuen et al., 2025; Yu et al., 2026).
  claim_refs:
  - C8
  expert_refs: []
- text: '** Both failure modes are identified but mechanistically opaque (Acharya, 2026; Rath, 2026).'
  claim_refs:
  - C11
  - C12
  expert_refs: []
- text: 'The foundational constraint is solid: static context windows reset after each invocation (Tan, 2026; Liu et al., 2025; Xu et al., 2025), memory is necessary for persistence (Yang et al., 2026; Sun & Zeng, 2025; Xu et al., 2025), and multi-agent settings intensify information volume pressure.'
  claim_refs:
  - C1
  - C2
  expert_refs: []
- text: 'Hand-engineered structured memory (H-MEM, spatial DAGs, agent-specific updates) delivers measurable efficiency gains: role-aware context routing saves 25–47% of tokens without quality loss (Liu et al., 2025).'
  claim_refs:
  - C4
  expert_refs: []
- text: But these approaches do not transfer across task domains (Yuen et al., 2025; Yu et al., 2026), and their efficiency saturates beyond ~2048 tokens per agent (Liu et al., 2025), suggesting they may hit an inherent ceiling imposed by heuristic design.
  claim_refs:
  - C8
  - C5
  expert_refs: []
- text: Formal bounds on memory efficiency (Parakhin, 2026) suggest the future lies in combining learning with constraints—yet that combination has not been built or tested systematically.
  claim_refs:
  - C6
  expert_refs: []
- text: Multi-agent performance saturates due to coordination overhead, not long-context failure alone (Kim et al., 2025; Li et al., 2026; Yang et al., 2025; Mao et al., 2026), but the field does not know whether centralized coordinators or decentralized negotiation genuinely avoids this ceiling.
  claim_refs:
  - C9
  expert_refs: []
- text: The interaction between memory capability and team size drives observed scaling limits, but the mechanism remains opaque beyond seven agents (Wu et al., 2026).
  claim_refs:
  - C10
  expert_refs: []
- text: Promising evidence comes from single frameworks and papers (Acharya, 2026; Rath, 2026), but causal mechanisms are speculative and untested via controlled ablation.
  claim_refs:
