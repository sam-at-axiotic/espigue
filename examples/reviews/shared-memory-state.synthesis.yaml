gaps:
- description: No controlled ablation has isolated the causal contribution of architectural drift to performance degradation; the studies are collectable but undone [C12].
  gap_type: empirical
- description: The field lacks an agreed automated method for generating transferable structured memory templates and routing heuristics across task domains [C8].
  gap_type: methodological
- description: Scaling laws for memory-equipped teams beyond seven agents, where communication bottlenecks and memory interference are expected to dominate, have not been measured [C9][C10].
  gap_type: empirical
