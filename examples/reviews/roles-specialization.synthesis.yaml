gaps:
- description: The three capability-allocation regimes—static metadata, dynamic estimation, learned routing—have never been compared head-to-head under matched compute, training-data, and transparency constraints; the methods exist but the controlled study has not been run.
  gap_type: empirical
- description: No standard instrument captures human cognitive workload in human-agent collaboration; evaluation measures agent accuracy while the burden shifted onto human collaborators goes unmeasured, and established human-factors instruments remain unadapted.
  gap_type: methodological
- description: Proposed multi-agent governance frameworks lack comparative validation against concrete threat models, and indirect prompt injection prevalence and techniques in deployed systems remain only beginning to be empirically characterized.
  gap_type: empirical
- description: No agreed framework reconciles the structural and designable readings of multi-agent misalignment, leaving open whether information asymmetry makes scheming rational independent of any mechanism.
  gap_type: theoretical
