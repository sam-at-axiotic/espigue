areas_of_agreement:
- Specialized role division outperforms homogeneous configurations as agents scale, but coordination cost caps the benefit, producing non-monotonic returns and inverted gains on simple tasks.
- Decentralized planning (dispatching plans to independent executors) beats centralized orchestration on concurrent actions and cost efficiency, while larger models orchestrate more accurately at higher cost.
- Coordination topologies carry predictable trade-offs among robustness, decomposition efficiency, and communication overhead.
- Practitioner case studies and agentic-reasoning surveys agree MAS accelerates prototyping and decomposes complex tasks, but production deployment demands alignment tuning and compliance work the prototypes defer.
areas_of_disagreement:
- Whether multi-agent misalignment is structurally inevitable under principal-agent information asymmetry (arxiv:2601.23211, structural reading) or a designable interaction flaw correctable through mechanism design and treated as a dynamic social process (arxiv:2601.23211 mechanism-design reading; arxiv:2506.01080; with empirical support from economic-penalty alignment in arxiv:2605.03310 and arxiv:2604.11477).
uncertainties:
- Whether economic-penalty alignment that worked in a single trading deployment generalizes beyond domains with sharp, measurable consequence structures.
- Whether long-horizon credit assignment and reward hacking in coding agents can be measured and mitigated reliably, given that paraphrase perturbations already swing failure rates by an order of magnitude.
- Whether governance mechanisms (Goal-Constraint Alignment, Decentralized Oversight Ledgers, collaborative verifiers) compose constructively or interfere when combined, since each is validated only in isolation.
