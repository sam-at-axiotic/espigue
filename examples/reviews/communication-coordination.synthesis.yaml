areas_of_agreement:
- Structured multi-agent topologies can beat single agents on reasoning, but the gains are bounded and require task-specific design.
- Coordination performance on distributed-computing tasks collapses with scale, reaching near zero at 100 agents.
- Uncritical acceptance of neighbor information lets a single silent error cascade into system-wide failure.
- Decentralized and hierarchical task-allocation architectures improve scalability and fault tolerance over centralized orchestration in tested settings.
areas_of_disagreement:
- Whether the 100-agent collapse is a fundamental coordination barrier or an implementation artifact of current prompting and protocols remains unresolved — no ablation isolates the cause.
- Whether binary global-correctness or partial-credit metrics best capture coordination success.
uncertainties:
- Whether scaling degradation generalizes beyond combinatorial distributed-computing tasks to planning, negotiation, and open-ended collaborative reasoning.
- Which mechanistic hypothesis — context saturation, bounded communication rounds, or combinatorial state explosion — dominates, since they have never been tested against each other.
- Whether larger models, better instruction-following, or reasoning tokens alter the collapse at 100 agents.
- Whether Byzantine-tolerant, gossip, and trust-based consensus protocols transferred from distributed computing actually reduce LLM coordination cascades, as none has been tested on a shared coordination benchmark.
