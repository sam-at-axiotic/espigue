- description: No controlled ablation has varied prompting, agent count, protocol, or task structure to determine whether the 100-agent collapse is fundamental or implementation-dependent; the methods exist but the studies have not been run.
  gap_type: empirical
- description: 'The field lacks an agreed coordination-success metric: AgentsNet''s strict binary criterion is the only systematic standard, and no partial-credit instrument has been validated across task classes.'
  gap_type: methodological
- description: Byzantine fault-tolerance, gossip, trust-based consensus, hierarchical routing, and SagaLLM-style context preservation have never been compared on identical coordination benchmarks against the scaling collapse.
  gap_type: empirical
- description: No framework predicts when adding agents yields beneficial emergent specialization versus when communication overhead and coordination noise dominate.
  gap_type: theoretical
