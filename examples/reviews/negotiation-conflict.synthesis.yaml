  expert_refs: []
- text: And organizational barriers—siloed teams, lack of cross-departmental coordination—are identified as primary deployment blockers (Acharya, 2026; Yang et al., 2025; Nagubandi, 2025; Shilpi, 2025; Dumas et al., 2026), yet no technical coordination system reports addressing or interacting with organizational readiness (Legara et al., 2026; Acharya, 2026).
  claim_refs:
