- text: The deeper problem is that classical distributed-systems fault and coordination models—frameworks that ground scaling analysis in other domains—do not map to semantic-layer coordination failures (Jia et al., 2026; Acharya, 2026; Bravo & Gotsman, 2019; Martin et al., 2012; Bayya, 2024).
  claim_refs:
  - C12
  expert_refs: []
- text: Until laboratory results are grounded in observation-driven and causal-tracing approaches on deployed systems (Kim et al., 2025; Qiao et al., 2026; Guan, 2026; Aggarwal & Lan, 2020; Aspnes & Waarts, 2003), no laboratory finding can inform deployment decisions.
  claim_refs:
  - C11
  expert_refs: []
- text: This cost structure has never been empirically measured against production cost data (Jia et al., 2026; Acharya, 2026; Bravo & Gotsman, 2019; Martin et al., 2012; Bayya, 2024), making the framework's central design choice unvalidated.
  claim_refs:
  - C12
  expert_refs: []
- text: Until this link is established (Khanal et al., 2026; Huang et al., 2026; Acharya, 2026; Pugachev, 2025; Wang, 2026), the field risks building technically sound solutions that fail to improve real deployments.
  claim_refs:
  - C13
  expert_refs: []
- text: Semantic Intent Divergence is a real and formalized failure mode in production multi-agent systems (Acharya, 2026); pre-execution detection is an architecturally sound principle that outperforms post-execution recovery in terms of workflow completion (Acharya, 2026); and the Semantic Consensus Framework demonstrates that SID-based detection can achieve 100% completion on simulated enterprise scenarios (Acharya, 2026).
  claim_refs:
  - C3
  - C7
  - C6
  expert_refs: []
- text: Process-awareness, despite being positioned as a foundational component of the framework, proves empirically optional—the ablation shows that SID-based detection alone achieves full reliability, with the Process Context Layer contributing only to precision (Acharya, 2026).
  claim_refs:
  - C9
  expert_refs: []
- text: The architecture's reliance on conservative pre-execution blocking rests on a cost asymmetry—false positives cost retries; false negatives cost total failure—that has never been measured against real production cost data and may not hold if production deployments reveal that false positives carry their own substantial expenses (Acharya, 2026).
  claim_refs:
  - C8
  expert_refs: []
- text: The evaluation is conducted entirely on simulated workloads, creating a systematic gap between laboratory results and production reality that current methodologies cannot close (Acharya, 2026; Khanal et al., 2026).
  claim_refs:
