gaps:
- description: No study links a process-awareness intervention as a technical mechanism to measured failure reduction in real deployments; domain systems in finance, derivatives, and wire-payment instantiate the scenarios but do not isolate the intervention's effect.
  gap_type: empirical
- description: The field lacks evaluation instruments that capture non-deterministic inference and context-dependent reasoning drift; simulation-based protocols cannot reproduce the conflict patterns of live agents, while deployed-system tracing methods are not yet standardized for comparative benchmarking.
  gap_type: methodological
- description: Coordination scalability breaking points and degradation patterns at hundreds-to-thousands of agents have been named but never characterized, and systems-level scaling foundations remain unconnected to the semantic coordination layer.
  gap_type: empirical
- description: External validity to real agent interactions cannot currently be established from simulation alone, since live multi-agent inference may produce conflict patterns more complex than any reconstructed scenario encodes.
  gap_type: epistemic
